<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="icon" type="image/png" href="src/img/favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop>
            <source src="src/vid/background.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="game-container">
        <div class="info-side">
            <h1>Tic Tac Toe</h1>
            <div class="scoreboard">
                <div class="score">X <span id="score-x">0</span></div>
                <div class="score">O <span id="score-o">0</span></div>
            </div>
            <div id="turn-indicator">Player X's Turn</div>
            <div class="controls">
                <select id="mode">
                    <option value="pvp">Player vs Player</option>
                    <option value="pvc">Player vs Computer</option>
                </select>
                <button id="reset">Reset Game</button>
            </div>
        </div>
        <div class="board-side">
            <div id="board" class="board">
                <!-- Boxes are dynamically generated by script.js -->
            </div>
            <div id="message"></div>
        </div>
    </div>

    <script src="src/script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
