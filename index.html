<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="icon" type="image/png" href="src/img/favicon.png">
    <link rel="manifest" href="src/pwa/manifest.json">
    <meta name="theme-color" content="#4CAF50">
</head>

<body>


    <div class="game-container">
        <div class="info-side">
            <h1>Tic Tac Toe</h1>
            <div class="scoreboard">
                <div class="score-box">
                    <div class="player-name x-color">Player X</div>
                    <div class="player-score" id="score-x">0</div>
                </div>
                <div class="vs-text">vs</div>
                <div class="score-box">
                    <div class="player-name o-color">Player O</div>
                    <div class="player-score" id="score-o">0</div>
                </div>
            </div>
            <div id="turn-indicator">Player X's Turn</div>
            <div class="controls">
                <div class="dropdown-row">
                    <div class="custom-dropdown" id="mode-dropdown">
                        <div class="dropdown-selected">
                            <span id="selected-text">1 VS 1</span>
                            <div class="dropdown-arrow"></div>
                        </div>
                        <div class="dropdown-options">
                            <div class="dropdown-option active" data-value="pvp">1 VS 1</div>
                            <div class="dropdown-option" data-value="pvc">1 VS COMPUTER</div>
                        </div>
                    </div>
                    <div class="custom-dropdown difficulty-hidden" id="difficulty-dropdown">
                        <div class="dropdown-selected">
                            <span id="difficulty-selected-text">MEDIUM</span>
                            <div class="dropdown-arrow"></div>
                        </div>
                        <div class="dropdown-options">
                            <div class="dropdown-option" data-value="easy">🟢 EASY</div>
                            <div class="dropdown-option active" data-value="medium">🟡 MEDIUM</div>
                            <div class="dropdown-option" data-value="hard">🔴 HARD</div>
                        </div>
                    </div>
                </div>
                <div class="button-row">
                    <button id="reset" aria-label="Reset Game" title="Reset Game">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                    <button id="vibration-toggle" aria-label="Toggle Vibration" title="Toggle Vibration">
                        <svg class="icon-vibrate" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 8 2 2-2 2 2 2-2 2"/><path d="m22 8-2 2 2 2-2 2 2 2"/><rect width="8" height="14" x="8" y="5" rx="1"/></svg>
                        <svg class="icon-silent" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="14" x="8" y="5" rx="1"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
                    </button>
                </div>
            </div>
        </div>
        <div class="board-side">
            <div class="board-container">
                <div id="board" class="board">
                    <!-- Boxes are dynamically generated by script.js -->
                </div>
                <div id="winning-line"></div>
            </div>
            <div id="message"></div>
        </div>
    </div>

    <script src="src/script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>

</html>
